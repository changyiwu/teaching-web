<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Glowing effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="reactor-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="70%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="30%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#0369a1" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="70%" stop-color="#b91c1c" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
  </defs>

  <!-- Background Shield -->
  <circle cx="100" cy="100" r="95" fill="url(#reactor-bg)" stroke="#1e293b" stroke-width="3" />
  
  <!-- Outer Metal Ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#gold-grad)" stroke-width="5" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6" />
  
  <!-- Inner Ring & Core -->
  <circle cx="100" cy="100" r="50" fill="url(#core-glow)" />
  <circle cx="100" cy="100" r="45" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#glow)" />
  <circle cx="100" cy="100" r="30" fill="none" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />

  <!-- Triangles / Coils radiating -->
  <g transform="translate(100,100)" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" filter="url(#glow)">
    <line x1="0" y1="-30" x2="0" y2="-45" />
    <line x1="0" y1="30" x2="0" y2="45" />
    <line x1="-30" y1="0" x2="-45" y2="0" />
    <line x1="30" y1="0" x2="45" y2="0" />
    
    <line x1="-21" y1="-21" x2="-32" y2="-32" />
    <line x1="21" y1="-21" x2="32" y2="-32" />
    <line x1="-21" y1="21" x2="-32" y2="32" />
    <line x1="21" y1="21" x2="32" y2="32" />
  </g>

  <!-- Cybernetic HUD details -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="10 15 2 5" opacity="0.8" />
  <circle cx="100" cy="100" r="20" fill="none" stroke="#e0f2fe" stroke-width="1" stroke-dasharray="4 4" />
</svg>

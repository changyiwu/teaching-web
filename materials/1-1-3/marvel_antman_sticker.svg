<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="pym-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="80%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    <linearGradient id="red-laser" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <linearGradient id="blue-laser" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
  </defs>

  <!-- Background Shield -->
  <circle cx="100" cy="100" r="95" fill="url(#pym-bg)" stroke="#374151" stroke-width="2" />
  
  <!-- Cyber HUD grids -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#4b5563" stroke-width="1" stroke-dasharray="4 4" />
  <circle cx="100" cy="100" r="70" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="20 40 5 10" opacity="0.6" filter="url(#glow)" />

  <!-- Ant-Man Helmet Graphic (Stylized flat icon) -->
  <g transform="translate(100, 100)" stroke="#9ca3af" stroke-width="2" fill="none">
    <!-- Outer helmet shape -->
    <path d="M -30 -10 C -30 -40, 30 -40, 30 -10 C 30 10, 20 30, 0 35 C -20 30, -30 10, -30 -10 Z" fill="#374151" stroke="#f3f4f6" stroke-width="2" />
    <!-- Eye pieces (Red Pym Glow) -->
    <polygon points="-18,-15 -5,-10 -5,-3 -16,-5" fill="#f43f5e" stroke="#ef4444" stroke-width="1" filter="url(#glow)" />
    <polygon points="18,-15 5,-10 5,-3 16,-5" fill="#f43f5e" stroke="#ef4444" stroke-width="1" filter="url(#glow)" />
    <!-- Antennas -->
    <line x1="-25" y1="-25" x2="-40" y2="-45" stroke="#f3f4f6" stroke-width="3" stroke-linecap="round" />
    <line x1="25" y1="-25" x2="40" y2="-45" stroke="#f3f4f6" stroke-width="3" stroke-linecap="round" />
    <!-- Mouthpiece ventilation details -->
    <rect x="-8" y="15" width="16" height="8" rx="2" fill="#1f2937" stroke="#9ca3af" />
    <line x1="-4" y1="19" x2="4" y2="19" stroke="#9ca3af" stroke-width="1" />
  </g>

  <!-- Distributive Arrows (Scaling & Branching - Distributive Law) -->
  <!-- Left Side: Red Pym Particle Shrink Arrow -->
  <path d="M 50 145 C 50 120, 35 110, 25 110" fill="none" stroke="url(#red-laser)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
  <polygon points="20,110 30,105 30,115" fill="#ef4444" filter="url(#glow)" />
  <text x="32" y="130" fill="#f87171" font-family="Outfit, sans-serif" font-weight="bold" font-size="12">a × b</text>

  <!-- Right Side: Blue Pym Particle Grow Arrow -->
  <path d="M 150 145 C 150 120, 165 110, 175 110" fill="none" stroke="url(#blue-laser)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
  <polygon points="180,110 170,105 170,115" fill="#06b6d4" filter="url(#glow)" />
  <text x="168" y="130" fill="#22d3ee" font-family="Outfit, sans-serif" font-weight="bold" font-size="12" text-anchor="end">a × c</text>

  <!-- Central formula text -->
  <rect x="50" y="155" width="100" height="24" rx="6" fill="#111827" stroke="#4b5563" stroke-width="1" />
  <text x="100" y="172" fill="#ffffff" font-family="Outfit, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">a(b + c) = ab + ac</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="portal-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c2d12" />
      <stop offset="50%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#090514" />
    </radialGradient>
  </defs>

  <!-- Background base -->
  <circle cx="100" cy="100" r="95" fill="url(#portal-bg)" stroke="#2e1065" stroke-width="2" />
  
  <!-- Outer Magic Ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="10 6 20 6" filter="url(#glow)" />
  <circle cx="100" cy="100" r="78" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 3" opacity="0.8" />
  
  <!-- Intersecting Magic Squares/Triangles -->
  <g stroke="#ea580c" stroke-width="1.5" fill="none" opacity="0.8" filter="url(#glow)">
    <rect x="45" y="45" width="110" height="110" transform="rotate(15 100 100)" />
    <rect x="45" y="45" width="110" height="110" transform="rotate(45 100 100)" />
    <rect x="45" y="45" width="110" height="110" transform="rotate(75 100 100)" />
    <circle cx="100" cy="100" r="55" stroke="#f59e0b" stroke-width="2" />
    <circle cx="100" cy="100" r="35" stroke="#ffffff" stroke-width="1" stroke-dasharray="4 8" />
  </g>

  <!-- Floating Mathematical Operations & Parentheses (The magic runes of math!) -->
  <g fill="#ffffff" font-family="'Courier New', monospace, sans-serif" font-weight="bold" font-size="22" text-anchor="middle" filter="url(#glow)">
    <!-- Add -->
    <text x="100" y="58" fill="#f59e0b">+</text>
    <!-- Subtract -->
    <text x="100" y="156" fill="#f59e0b">-</text>
    <!-- Multiply -->
    <text x="50" y="107" fill="#f59e0b">×</text>
    <!-- Divide -->
    <text x="150" y="107" fill="#f59e0b">÷</text>
    
    <!-- Parentheses -->
    <text x="70" y="75" fill="#a855f7">(</text>
    <text x="130" y="75" fill="#a855f7">)</text>
    
    <!-- Brackets -->
    <text x="65" y="135" fill="#d946ef">[</text>
    <text x="135" y="135" fill="#d946ef">]</text>

    <!-- Absolute Value bars in center -->
    <text x="82" y="107" fill="#22d3ee" font-size="28">|</text>
    <text x="118" y="107" fill="#22d3ee" font-size="28">|</text>
    <text x="100" y="106" fill="#ffffff" font-size="14">x</text>
  </g>

  <!-- Outer Sparks -->
  <g fill="#f59e0b" filter="url(#glow)">
    <circle cx="100" cy="8" r="2.5" />
    <circle cx="100" cy="192" r="2.5" />
    <circle cx="8" cy="100" r="2.5" />
    <circle cx="192" cy="100" r="2.5" />
  </g>
</svg>

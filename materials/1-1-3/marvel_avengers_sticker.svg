<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="avengers-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#38bdf8" />
      <stop offset="70%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="space-portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#020617" />
      <stop offset="100%" stop-color="#090514" />
    </radialGradient>
  </defs>

  <!-- Background Base -->
  <circle cx="100" cy="100" r="95" fill="url(#space-portal)" stroke="#1e1b4b" stroke-width="2" />
  
  <!-- Outer Tech Ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="20 10 5 10 30 10" filter="url(#glow)" />
  <circle cx="100" cy="100" r="82" fill="none" stroke="#f43f5e" stroke-width="1" stroke-dasharray="2 4" opacity="0.6" />

  <!-- Avengers Stylized 'A' Logo -->
  <g transform="translate(100, 100) scale(1.1)" filter="url(#glow)">
    <!-- Outer Arrow-ring part of A -->
    <path d="M 20 -40 A 45 45 0 0 1 45 0 M 45 0 L 22 0 M 22 0 A 25 25 0 0 0 10 -20" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    <path d="M -45 10 A 45 45 0 0 0 20 45 L 30 25" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
    
    <!-- Main 'A' Shape -->
    <!-- Left bar of A -->
    <polygon points="-8,45 -22,45 8,-48 20,-48" fill="url(#avengers-a)" stroke="#0ea5e9" stroke-width="1.5" />
    <!-- Right bar of A -->
    <polygon points="12,-15 -2,22 10,48 24,48" fill="url(#avengers-a)" stroke="#0ea5e9" stroke-width="1.5" />
    <!-- Horizontal bar of A extending to the right arrow -->
    <polygon points="-12,3 32,3 32,-5 -15,-5" fill="url(#avengers-a)" stroke="#0ea5e9" stroke-width="1.5" />
  </g>

  <!-- Outer Stars/Sparks (Marvel Cosmic Energy) -->
  <g fill="#38bdf8" filter="url(#glow)">
    <!-- Cyan sparks -->
    <circle cx="45" cy="45" r="2" />
    <circle cx="155" cy="45" r="2" />
    <circle cx="155" cy="155" r="2" />
    <circle cx="45" cy="155" r="2" />
    <!-- Gold sparks -->
    <circle cx="100" cy="20" r="1.5" fill="#f59e0b" />
    <circle cx="100" cy="180" r="1.5" fill="#f59e0b" />
    <circle cx="20" cy="100" r="1.5" fill="#f59e0b" />
    <circle cx="180" cy="100" r="1.5" fill="#f59e0b" />
  </g>
</svg>

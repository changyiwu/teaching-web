<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="spider-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="60%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </radialGradient>
  </defs>

  <!-- Background Shield -->
  <circle cx="100" cy="100" r="95" fill="url(#spider-bg)" stroke="#1e293b" stroke-width="3" />
  
  <!-- Web Lines -->
  <g stroke="#0f172a" stroke-width="1.5" fill="none" opacity="0.85">
    <!-- Concentric Web Rings -->
    <path d="M 60 100 A 40 40 0 0 1 140 100 A 40 40 0 0 1 60 100" />
    <path d="M 40 100 A 60 60 0 0 1 160 100 A 60 60 0 0 1 40 100" />
    <path d="M 20 100 A 80 80 0 0 1 180 100 A 80 80 0 0 1 20 100" />
    
    <!-- Radial lines -->
    <line x1="100" y1="100" x2="100" y2="5" />
    <line x1="100" y1="100" x2="100" y2="195" />
    <line x1="100" y1="100" x2="5" y2="100" />
    <line x1="100" y1="100" x2="195" y2="100" />
    
    <line x1="100" y1="100" x2="33" y2="33" />
    <line x1="100" y1="100" x2="167" y2="33" />
    <line x1="100" y1="100" x2="33" y2="167" />
    <line x1="100" y1="100" x2="167" y2="167" />
  </g>

  <!-- Spidey Eyes -->
  <!-- Left Eye -->
  <path d="M 35 90 C 45 70, 75 60, 95 85 C 80 115, 60 125, 35 90 Z" fill="#ffffff" stroke="#000000" stroke-width="6" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Right Eye -->
  <path d="M 165 90 C 155 70, 125 60, 105 85 C 120 115, 140 125, 165 90 Z" fill="#ffffff" stroke="#000000" stroke-width="6" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Subtle Glowing highlights on eyes -->
  <path d="M 42 88 C 50 75, 70 68, 88 84 C 77 105, 62 112, 42 88 Z" fill="#ffffff" opacity="0.9" />
  <path d="M 158 88 C 150 75, 130 68, 112 84 C 123 105, 138 112, 158 88 Z" fill="#ffffff" opacity="0.9" />

  <!-- Outer Cyber Ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="12 24" filter="url(#glow)" />
</svg>

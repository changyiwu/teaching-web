<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="panel-bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="60%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>
    <linearGradient id="ironman-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
    <linearGradient id="ironman-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="spidey-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="hollow-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND GRID -->
  <rect width="1024" height="1024" fill="#030712" />
  <g opacity="0.1" stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="128" x2="1024" y2="128" />
    <line x1="0" y1="256" x2="1024" y2="256" />
    <line x1="0" y1="384" x2="1024" y2="384" />
    <line x1="0" y1="512" x2="1024" y2="512" />
    <line x1="0" y1="640" x2="1024" y2="640" />
    <line x1="0" y1="768" x2="1024" y2="768" />
    <line x1="0" y1="896" x2="1024" y2="896" />
    
    <line x1="128" y1="0" x2="128" y2="1024" />
    <line x1="256" y1="0" x2="256" y2="1024" />
    <line x1="384" y1="0" x2="384" y2="1024" />
    <line x1="512" y1="0" x2="512" y2="1024" />
    <line x1="640" y1="0" x2="640" y2="1024" />
    <line x1="768" y1="0" x2="768" y2="1024" />
    <line x1="896" y1="0" x2="896" y2="1024" />
  </g>

  <!-- ==================== PANEL 1 (Top-Left): Rise, 2s after ==================== -->
  <g transform="translate(0, 0)">
    <clipPath id="panel1-clip"><rect x="10" y="10" width="492" height="492" rx="16" /></clipPath>
    <g clip-path="url(#panel1-clip)">
      <rect x="10" y="10" width="492" height="492" fill="url(#panel-bg-grad)" />
      
      <!-- Hologram Screen -->
      <polygon points="100,80 420,60 400,280 80,300" fill="url(#hollow-cyan)" stroke="#06b6d4" stroke-width="2" opacity="0.6" />
      <!-- Wave grid inside hologram -->
      <path d="M 120 200 Q 200 130 280 220 T 380 180" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glow)" />
      <circle cx="280" cy="220" r="6" fill="#ffffff" filter="url(#glow)" />
      <text x="290" y="215" fill="#22d3ee" font-family="Outfit, sans-serif" font-weight="bold" font-size="16">+4 × (+2) = +8</text>
      
      <!-- Iron Man Helmet (Stylized) -->
      <g transform="translate(80, 240) scale(1.6)">
        <path d="M10,60 C10,30 25,10 50,10 C75,10 90,30 90,60 C90,110 50,120 50,120 C50,120 10,110 10,60 Z" fill="url(#ironman-red)" />
        <path d="M22,50 C22,40 32,32 50,32 C68,32 78,40 78,50 C78,65 72,85 50,85 C28,85 22,65 22,50 Z" fill="url(#ironman-gold)" />
        <!-- Glowing Cyan Eyes -->
        <polygon points="30,45 42,48 40,54 28,50" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5" filter="url(#glow)" />
        <polygon points="70,45 58,48 60,54 72,50" fill="#e0f7fa" stroke="#00bcd4" stroke-width="1.5" filter="url(#glow)" />
      </g>
    </g>
    <rect x="10" y="10" width="492" height="492" rx="16" fill="none" stroke="#e2e8f0" stroke-width="6" />
  </g>

  <!-- ==================== PANEL 2 (Top-Right): Rise, 2s before ==================== -->
  <g transform="translate(512, 0)">
    <clipPath id="panel2-clip"><rect x="10" y="10" width="492" height="492" rx="16" /></clipPath>
    <g clip-path="url(#panel2-clip)">
      <rect x="10" y="10" width="492" height="492" fill="url(#panel-bg-grad)" />
      
      <!-- Spidey Web Background (Subtle) -->
      <circle cx="400" cy="180" r="100" fill="none" stroke="#1e293b" stroke-width="1.5" />
      
      <!-- Hologram Screen -->
      <polygon points="50,60 380,80 360,260 70,280" fill="url(#hollow-cyan)" stroke="#a855f7" stroke-width="2" opacity="0.6" />
      <path d="M 80 180 Q 200 240 320 140" fill="none" stroke="#d8b4fe" stroke-width="3" filter="url(#glow)" />
      <circle cx="200" cy="210" r="6" fill="#ffffff" filter="url(#glow)" />
      <text x="210" y="205" fill="#e9d5ff" font-family="Outfit, sans-serif" font-weight="bold" font-size="16">+4 × (-2) = -8</text>

      <!-- Spider-Man Mask (Stylized) -->
      <g transform="translate(300, 260) scale(1.5)">
        <path d="M10,50 C10,20 30,10 50,10 C70,10 90,20 90,50 C90,85 50,110 50,110 C50,110 10,85 10,50 Z" fill="#ef4444" />
        <!-- Eye Left -->
        <path d="M20,45 C28,30 44,28 48,45 C42,58 30,62 20,45 Z" fill="#ffffff" stroke="#000000" stroke-width="3" />
        <!-- Eye Right -->
        <path d="M80,45 C72,30 56,28 52,45 C58,58 70,62 80,45 Z" fill="#ffffff" stroke="#000000" stroke-width="3" />
      </g>
    </g>
    <rect x="10" y="10" width="492" height="492" rx="16" fill="none" stroke="#e2e8f0" stroke-width="6" />
  </g>

  <!-- ==================== PANEL 3 (Bottom-Left): Fall, 2s after ==================== -->
  <g transform="translate(0, 512)">
    <clipPath id="panel3-clip"><rect x="10" y="10" width="492" height="492" rx="16" /></clipPath>
    <g clip-path="url(#panel3-clip)">
      <rect x="10" y="10" width="492" height="492" fill="url(#panel-bg-grad)" />
      
      <!-- Warning holographic details -->
      <polygon points="100,60 400,60 380,240 80,240" fill="url(#hollow-cyan)" stroke="#f43f5e" stroke-width="2" opacity="0.6" />
      <path d="M 120 120 Q 240 220 340 100" fill="none" stroke="#fda4af" stroke-width="3" filter="url(#glow)" />
      <circle cx="240" cy="170" r="6" fill="#ffffff" filter="url(#glow)" />
      <text x="140" y="210" fill="#fecdd3" font-family="Outfit, sans-serif" font-weight="bold" font-size="18">(-4) × (+2) = -8</text>
      
      <!-- Chibi Iron Man looking stressed -->
      <g transform="translate(80, 240) scale(1.6)">
        <path d="M10,60 C10,30 25,10 50,10 C75,10 90,30 90,60 C90,110 50,120 50,120 C50,120 10,110 10,60 Z" fill="url(#ironman-red)" />
        <path d="M22,50 C22,40 32,32 50,32 C68,32 78,40 78,50 C78,65 72,85 50,85 C28,85 22,65 22,50 Z" fill="url(#ironman-gold)" />
        <!-- Dimmer Red/Orange Eyes -->
        <polygon points="30,45 42,48 40,54 28,50" fill="#ffeb3b" stroke="#ff5722" stroke-width="1.5" filter="url(#glow)" />
        <polygon points="70,45 58,48 60,54 72,50" fill="#ffeb3b" stroke="#ff5722" stroke-width="1.5" filter="url(#glow)" />
      </g>
    </g>
    <rect x="10" y="10" width="492" height="492" rx="16" fill="none" stroke="#e2e8f0" stroke-width="6" />
  </g>

  <!-- ==================== PANEL 4 (Bottom-Right): Fall, 2s before ==================== -->
  <g transform="translate(512, 512)">
    <clipPath id="panel4-clip"><rect x="10" y="10" width="492" height="492" rx="16" /></clipPath>
    <g clip-path="url(#panel4-clip)">
      <rect x="10" y="10" width="492" height="492" fill="url(#panel-bg-grad)" />
      
      <!-- Bright glowing Hologram -->
      <polygon points="80,80 400,60 380,280 100,300" fill="url(#hollow-cyan)" stroke="#10b981" stroke-width="2" opacity="0.6" />
      <path d="M 120 220 Q 200 130 320 220" fill="none" stroke="#34d399" stroke-width="3" filter="url(#glow)" />
      <circle cx="200" cy="175" r="6" fill="#ffffff" filter="url(#glow)" />
      <text x="140" y="260" fill="#a7f3d0" font-family="Outfit, sans-serif" font-weight="bold" font-size="20">(-4) × (-2) = +8</text>

      <!-- Spider-Man Mask scratching head -->
      <g transform="translate(300, 260) scale(1.5)">
        <path d="M10,50 C10,20 30,10 50,10 C70,10 90,20 90,50 C90,85 50,110 50,110 C50,110 10,85 10,50 Z" fill="#ef4444" />
        <!-- Big thinking Eyes -->
        <path d="M18,48 C28,30 42,28 46,48 C40,62 28,64 18,48 Z" fill="#ffffff" stroke="#000000" stroke-width="3.5" />
        <path d="M82,48 C72,30 58,28 54,48 C60,62 72,64 82,48 Z" fill="#ffffff" stroke="#000000" stroke-width="3.5" />
      </g>
    </g>
    <rect x="10" y="10" width="492" height="492" rx="16" fill="none" stroke="#e2e8f0" stroke-width="6" />
  </g>

  <!-- ==================== OVERLAID DIALOGUE CAPTIONS ==================== -->
  <!-- Dialog Box 1 (Panel 1) -->
  <g transform="translate(30, 400)">
    <rect width="452" height="75" rx="8" fill="#fffff8" opacity="0.92" stroke="#000000" stroke-width="2" />
    <text x="226" y="44" fill="#000000" font-family="Microsoft JhengHei, sans-serif" font-weight="bold" font-size="20" text-anchor="middle">
      反應爐能量每秒穩定上升 4%，2秒後是...
    </text>
  </g>

  <!-- Dialog Box 2 (Panel 2) -->
  <g transform="translate(542, 400)">
    <rect width="452" height="75" rx="8" fill="#fffff8" opacity="0.92" stroke="#000000" stroke-width="2" />
    <text x="226" y="44" fill="#000000" font-family="Microsoft JhengHei, sans-serif" font-weight="bold" font-size="20" text-anchor="middle">
      增加 4 × 2 = 8%，好極了！但 2 秒前呢？
    </text>
  </g>

  <!-- Dialog Box 3 (Panel 3) -->
  <g transform="translate(30, 912)">
    <rect width="452" height="75" rx="8" fill="#fffff8" opacity="0.92" stroke="#000000" stroke-width="2" />
    <text x="226" y="44" fill="#000000" font-family="Microsoft JhengHei, sans-serif" font-weight="bold" font-size="20" text-anchor="middle">
      若每秒下降 4%（記作 -4%），2秒後會是...
    </text>
  </g>

  <!-- Dialog Box 4 (Panel 4) -->
  <g transform="translate(542, 912)">
    <rect width="452" height="75" rx="8" fill="#fffff8" opacity="0.92" stroke="#000000" stroke-width="2" />
    <text x="226" y="44" fill="#000000" font-family="Microsoft JhengHei, sans-serif" font-weight="bold" font-size="20" text-anchor="middle">
      減少 8%！那 2 秒前（-2秒）的能量是...
    </text>
  </g>
</svg>
